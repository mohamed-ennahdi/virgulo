Configuration:
  status: info
  name: MyConfig
  
  Appenders:
    Console:
      name: Console
      target: SYSTEM_OUT
      PatternLayout:
        pattern: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%-5level] %logger{36} - %msg%n"
  
  Loggers:
    Root:
      level: info
      AppenderRef:
        ref: Console